<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Head silhouette with circuit pattern -->
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D946EF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer head shape -->
  <ellipse cx="100" cy="85" rx="55" ry="65" stroke="url(#neonGlow)" stroke-width="2" fill="none" filter="url(#glow)"/>
  
  <!-- Circuit lines - horizontal -->
  <path d="M60 60 L85 60 L90 65 L110 65" stroke="#D946EF" stroke-width="1.5" opacity="0.8"/>
  <path d="M55 75 L75 75 L80 80 L100 80" stroke="#D946EF" stroke-width="1.5" opacity="0.7"/>
  <path d="M58 90 L80 90 L85 95 L105 95" stroke="#F97316" stroke-width="1.5" opacity="0.8"/>
  <path d="M62 105 L78 105 L83 110 L98 110" stroke="#F97316" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Circuit lines - right side -->
  <path d="M120 60 L140 60 L145 65" stroke="#D946EF" stroke-width="1.5" opacity="0.8"/>
  <path d="M125 75 L145 75 L150 80" stroke="#D946EF" stroke-width="1.5" opacity="0.7"/>
  <path d="M122 90 L142 90 L147 95" stroke="#F97316" stroke-width="1.5" opacity="0.8"/>
  <path d="M118 105 L138 105 L143 110" stroke="#F97316" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Circuit nodes (dots) -->
  <circle cx="85" cy="60" r="2" fill="#D946EF" filter="url(#glow)"/>
  <circle cx="75" cy="75" r="2" fill="#D946EF" filter="url(#glow)"/>
  <circle cx="80" cy="90" r="2" fill="#F97316" filter="url(#glow)"/>
  <circle cx="78" cy="105" r="2" fill="#F97316" filter="url(#glow)"/>
  <circle cx="140" cy="60" r="2" fill="#D946EF" filter="url(#glow)"/>
  <circle cx="145" cy="75" r="2" fill="#D946EF" filter="url(#glow)"/>
  <circle cx="142" cy="90" r="2" fill="#F97316" filter="url(#glow)"/>
  <circle cx="138" cy="105" r="2" fill="#F97316" filter="url(#glow)"/>
  
  <!-- Brain/circuit center pattern -->
  <circle cx="100" cy="85" r="15" stroke="url(#neonGlow)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M92 80 L96 85 L100 80 L104 85 L108 80" stroke="#D946EF" stroke-width="1.2" opacity="0.7"/>
  <path d="M94 92 L98 88 L102 92 L106 88" stroke="#F97316" stroke-width="1.2" opacity="0.7"/>
  
  <!-- Neck base -->
  <path d="M85 145 L85 165 Q85 175 100 175 Q115 175 115 165 L115 145" stroke="url(#neonGlow)" stroke-width="2" fill="none" opacity="0.8"/>
  
  <!-- Additional circuit details -->
  <circle cx="100" cy="70" r="3" fill="#D946EF" filter="url(#glow)"/>
  <circle cx="95" cy="95" r="2.5" fill="#F97316" filter="url(#glow)"/>
  <circle cx="105" cy="100" r="2" fill="#D946EF" filter="url(#glow)"/>
</svg>
